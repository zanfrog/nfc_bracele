<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>簪蛙&米蛙幸運手串｜每日能量小站</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --ink:#2B2140;
    --charcoal:#1B1233;
    --charcoal-2:#2A1E4A;
    --paper:#F2E8D3;
    --mist:#9483A8;
    --slate:#7C5CBF;
    --gold:#CBA05A;
    --ssr:#B98CE0;
    --hairline:rgba(43,33,64,0.18);
    --hairline-light:rgba(203,160,90,0.22);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100%;}
  body{
    font-family:'Noto Sans TC',sans-serif;
    min-height:100vh;
    display:flex;justify-content:center;align-items:center;
    background:radial-gradient(ellipse at 50% 0%, #2A1E4A 0%, #1B1233 45%, #0E0A1C 100%);
    position:relative;overflow-x:hidden;
    padding:20px 16px 32px;
    transition:background 0.6s ease;
  }
  body.ssr-mode{background:radial-gradient(ellipse at 50% 0%, #33204F 0%, #150C28 55%, #08050F 100%);}
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(circle at 20% 20%, rgba(124,92,191,0.18), transparent 45%),
      radial-gradient(circle at 80% 70%, rgba(203,160,90,0.10), transparent 50%);
  }
  #starfield{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .star{position:absolute;background:#F2E8D3;border-radius:50%;animation:twinkle ease-in-out infinite;}
  @keyframes twinkle{
    0%,100%{opacity:0.15;transform:scale(0.8);}
    50%{opacity:0.95;transform:scale(1.15);}
  }
  .gold-line{position:fixed;top:0;left:0;right:0;height:2px;z-index:5;
    background:linear-gradient(90deg, transparent, var(--gold) 20%, #EAD48F 50%, var(--gold) 80%, transparent);
    box-shadow:0 0 10px rgba(203,160,90,0.6);}

  /* 流星雨(SSR限定) */
  #meteor-field{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;display:none;}
  #meteor-field.active{display:block;}
  .meteor{
    position:absolute;top:-10%;width:2px;height:90px;
    background:linear-gradient(180deg, rgba(255,255,255,0), #fff);
    opacity:0;transform:rotate(28deg);
    animation:meteorFall linear infinite;
  }
  @keyframes meteorFall{
    0%{opacity:0;transform:translateY(-10%) rotate(28deg);}
    8%{opacity:1;}
    85%{opacity:0.9;}
    100%{opacity:0;transform:translateY(115vh) rotate(28deg);}
  }

  .stage{position:relative;z-index:2;width:100%;max-width:340px;}

  /* 右上角圖鑑icon */
  .icon-btn{
    position:fixed;top:16px;z-index:6;
    width:38px;height:38px;border-radius:50%;
    background:rgba(27,18,51,0.9);border:1px solid var(--hairline-light);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    backdrop-filter:blur(6px);
  }
  #dashboard-btn{right:16px;}
  .icon-btn svg{width:18px;height:18px;}

  .brandbar{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0 18px;}
  .brandbar .rule-row{display:flex;align-items:center;gap:8px;}
  .brandbar .rule{height:1px;width:26px;background:var(--hairline-light);}
  .brandbar span.brand-name{font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.22em;color:#E7D9C2;font-weight:600;white-space:nowrap;}
  .brandbar span.brand-sub{font-family:'Cinzel',serif;font-size:0.56rem;letter-spacing:0.32em;color:var(--gold);opacity:0.8;}

  .panel{background:var(--paper);border:1px solid rgba(203,160,90,0.35);border-radius:8px;overflow:hidden;position:relative;box-shadow:0 0 0 1px rgba(203,160,90,0.12), 0 18px 40px rgba(0,0,0,0.45);}
  .panel.ssr-glow{box-shadow:0 0 0 2px var(--ssr), 0 0 28px rgba(185,140,224,0.65);}
  .panel .corner-tl, .panel .corner-tr, .panel .corner-bl, .panel .corner-br{
    position:absolute;width:16px;height:16px;pointer-events:none;z-index:3;
    border:1px solid var(--gold);opacity:0.7;
  }
  .panel .corner-tl{top:6px;left:6px;border-right:none;border-bottom:none;}
  .panel .corner-tr{top:6px;right:6px;border-left:none;border-bottom:none;}
  .panel .corner-bl{bottom:6px;left:6px;border-right:none;border-top:none;}
  .panel .corner-br{bottom:6px;right:6px;border-left:none;border-top:none;}
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--charcoal-2);border-bottom:1px solid var(--hairline-light);}
  .badge{width:34px;height:34px;border-radius:50%;background:var(--charcoal);border:1px solid rgba(203,160,90,0.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .badge svg{width:19px;height:19px;}
  #date-display{font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:0.1em;color:#E7D9C2;font-weight:500;margin:0;}
  .spec-tag{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.14em;color:var(--gold);border:1px solid rgba(203,160,90,0.5);padding:3px 8px;border-radius:3px;}
  .spec-tag.ssr{color:var(--ssr);border-color:rgba(185,140,224,0.6);}

  .panel-body{padding:32px 26px 26px;display:flex;flex-direction:column;align-items:center;text-align:center;min-height:230px;justify-content:center;}

  .draw-btn{background:transparent;color:var(--ink);border:1px solid var(--ink);padding:13px 30px;font-family:'Noto Sans TC',sans-serif;font-size:0.92rem;font-weight:500;letter-spacing:0.06em;border-radius:3px;cursor:pointer;position:relative;overflow:hidden;transition:background 0.2s ease, color 0.2s ease;}
  .draw-btn:active{background:var(--ink);color:var(--paper);}
  .draw-btn .ripple{position:absolute;border-radius:50%;background:rgba(30,33,38,0.18);transform:scale(0);animation:rippleGo 0.6s ease-out forwards;pointer-events:none;}
  @keyframes rippleGo{to{transform:scale(3.2);opacity:0;}}

  #ritual-stage{display:none;width:100%;}
  #ritual-stage.active{display:flex;flex-direction:column;align-items:center;gap:12px;}

  /* ============================================
     凝聚星辰之力：讀取動畫
     小星辰從四面八方聚攏 -> 中心星芒成形並發光脈動
     -> 完成後由 .star-burst 負責向全螢幕擴散、再淡出轉場
     ============================================ */
  .stage-gather{position:relative;width:100%;max-width:190px;height:130px;margin:0 auto;overflow:visible;}

  .g-star{
    position:absolute;top:50%;left:50%;width:6px;height:6px;margin:-3px;
    border-radius:50%;background:var(--gold);
    box-shadow:0 0 6px 1px rgba(203,160,90,0.85);
    opacity:0;
    animation:star-converge 1500ms ease-in forwards;
  }
  @keyframes star-converge{
    0%{transform:translate(var(--sx), var(--sy)) scale(1);opacity:0;}
    10%{opacity:1;}
    100%{transform:translate(0,0) scale(0.15);opacity:0;}
  }

  .gather-core{position:absolute;top:50%;left:50%;width:44px;height:44px;margin:-22px;opacity:0;}
  .gather-core .core-glow{
    position:absolute;inset:-32px;border-radius:50%;
    background:radial-gradient(circle, rgba(203,160,90,0.55) 0%, rgba(203,160,90,0) 70%);
    opacity:0;
  }
  .gather-core .core-svg{position:relative;width:100%;height:100%;display:block;filter:drop-shadow(0 0 4px rgba(203,160,90,0.7));}

  #ritual-stage.active .gather-core{animation:core-grow 700ms ease-out 1750ms forwards;}
  #ritual-stage.active .gather-core .core-svg{animation:core-spin-pulse 900ms ease-in-out 2450ms infinite;}
  #ritual-stage.active .gather-core .core-glow{animation:glow-fade-in 700ms ease-out 1750ms forwards, glow-pulse 900ms ease-in-out 2450ms infinite;}

  @keyframes core-grow{
    0%{opacity:0;transform:scale(0.2);}
    100%{opacity:1;transform:scale(1);}
  }
  @keyframes core-spin-pulse{
    0%,100%{transform:scale(1) rotate(0deg);}
    50%{transform:scale(1.18) rotate(18deg);}
  }
  @keyframes glow-fade-in{
    0%{opacity:0;}
    100%{opacity:1;}
  }
  @keyframes glow-pulse{
    0%,100%{opacity:0.6;transform:scale(1);}
    50%{opacity:1;transform:scale(1.3);}
  }

  /* 全螢幕星力擴散轉場 */
  .star-burst{
    position:fixed;inset:0;z-index:21;pointer-events:none;opacity:0;
    background:radial-gradient(circle at 50% 42%, #FFF9EC 0%, #F4D998 28%, #CBA05A 52%, rgba(203,160,90,0.92) 74%, rgba(203,160,90,0.65) 100%);
    clip-path:circle(0% at 50% 42%);
  }
  .star-burst.expand{animation:burst-expand 560ms cubic-bezier(.22,.8,.24,1) forwards;}
  .star-burst.fade-out{animation:burst-fade 560ms ease forwards;}
  @keyframes burst-expand{
    0%{clip-path:circle(0% at 50% 42%);opacity:1;}
    100%{clip-path:circle(150% at 50% 42%);opacity:1;}
  }
  @keyframes burst-fade{
    0%{opacity:1;}
    100%{opacity:0;}
  }

  /* 進度條 0~100 */
  .progress-wrap{width:100%;max-width:190px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .progress-track{width:100%;height:6px;border-radius:4px;background:var(--hairline);overflow:hidden;}
  .progress-fill{height:100%;width:0%;border-radius:4px;background:linear-gradient(90deg, var(--slate), var(--gold));}
  .progress-num{font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.08em;color:var(--mist);}
  .progress-num::after{content:'%';}

  .weave-label{font-size:0.68rem;letter-spacing:0.12em;color:var(--mist);}

  #result-container{display:none;width:100%;}
  #result-container.show{display:flex;flex-direction:column;align-items:center;}

  .reveal-item{opacity:0;transform:translateY(8px);}
  .reveal-item.play{animation:revealUp 0.5s ease forwards;}
  @keyframes revealUp{to{opacity:1;transform:translateY(0);}}

  .ssr-banner{display:none;font-size:0.72rem;letter-spacing:0.18em;color:var(--ssr);font-weight:700;margin-bottom:14px;}
  .ssr-banner.show{display:block;animation:revealUp 0.5s ease forwards;}

  .legend-row{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--ink);font-weight:500;margin-bottom:22px;}
  #color-box{width:22px;height:22px;border-radius:50%;border:1px solid rgba(30,33,38,0.3);flex-shrink:0;}
  #color-box.pop{animation:dotPop 0.4s ease forwards;}
  @keyframes dotPop{0%{transform:scale(0);}100%{transform:scale(1);}}
  .highlight-color{font-weight:600;}

  .spec-block{width:100%;border-top:1px solid var(--hairline);border-bottom:1px solid var(--hairline);padding:16px 0;margin-bottom:22px;}
  .spec-block .spec-label{font-size:0.62rem;letter-spacing:0.18em;color:var(--mist);margin-bottom:6px;}
  #number-val{font-family:'Cinzel',serif;font-size:2.3rem;font-weight:600;color:var(--ink);letter-spacing:0.03em;line-height:1;}
  #number-seal.stamp #number-val{animation:numIn 0.4s ease forwards;}
  @keyframes numIn{0%{opacity:0;transform:translateY(4px);}100%{opacity:1;transform:translateY(0);}}

  #wish{font-family:"標楷體","DFKai-SB","BiauKai","STKaiti","KaiTi",serif;font-size:1.14rem;line-height:1.75;color:var(--ink);padding:14px 16px;border:1px solid var(--hairline);border-radius:4px;background:rgba(91,114,128,0.05);}

  .action-row{display:flex;gap:10px;margin-top:20px;width:100%;}
  .ghost-btn{flex:1;background:transparent;border:1px solid var(--hairline);color:var(--ink);font-size:0.76rem;letter-spacing:0.04em;padding:10px 8px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Noto Sans TC',sans-serif;}
  .ghost-btn svg{width:14px;height:14px;}
  .ghost-btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  .redraw-note{margin-top:14px;font-size:0.68rem;letter-spacing:0.06em;color:var(--mist);}
  .share-status{margin-top:10px;font-size:0.68rem;color:var(--slate);min-height:14px;}

  /* Modal 共用 */
  .modal-overlay{position:fixed;inset:0;background:rgba(14,8,26,0.78);z-index:20;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
  .modal-overlay.show{display:flex;}
  .modal-box{background:var(--paper);border:1px solid rgba(203,160,90,0.4);border-radius:8px;max-width:360px;width:100%;max-height:86vh;overflow-y:auto;padding:24px 22px;position:relative;}
  .modal-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:1.1rem;color:var(--mist);cursor:pointer;}
  .modal-title{font-family:'Cinzel',serif;font-size:0.98rem;font-weight:600;color:var(--ink);margin:0 0 4px;}
  .modal-sub{font-size:0.74rem;color:var(--mist);margin:0 0 18px;}

  /* ============================================
     底部彈出視窗觸發按鈕 (顯示於抽籤結果下方)
     ============================================ */
  .sheet-trigger-btn{
    margin-top:14px;
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold);
    font-family:'Cinzel',serif;
    font-size:0.78rem;letter-spacing:0.08em;
    padding:10px 22px;border-radius:20px;
    cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease;
  }
  .sheet-trigger-btn:active{background:var(--gold);color:var(--charcoal);}

  /* ============================================
     底部彈出視窗 (Bottom Sheet) 遮罩層
     預設完全透明且不可點擊，開啟時淡入並接收點擊
     ============================================ */
  .sheet-overlay{
    position:fixed;inset:0;z-index:29;
    background:rgba(14,8,26,0.75);
    opacity:0;pointer-events:none;
    transition:opacity 0.3s ease;
  }
  .sheet-overlay.show{opacity:1;pointer-events:auto;}

  /* ============================================
     底部彈出視窗 (Bottom Sheet) 主體
     預設位移至螢幕下方 100% (完全隱藏)
     開啟時 transform 平滑滑回 0 (ease-out)
     ============================================ */
  .bottom-sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:var(--paper);
    border-top:1px solid rgba(203,160,90,0.5);
    border-radius:18px 18px 0 0;
    padding:14px 22px 30px;
    max-height:82vh;overflow-y:auto;
    box-shadow:0 -12px 40px rgba(0,0,0,0.5);
    transform:translateY(100%);
    transition:transform 0.3s ease-out;
  }
  .bottom-sheet.open{transform:translateY(0);}

  .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--hairline);margin:0 auto 14px;}
  .sheet-close{
    position:absolute;top:14px;right:18px;
    background:none;border:none;font-size:1.1rem;
    color:var(--mist);cursor:pointer;line-height:1;
  }

  .guidance-head{padding:2px 0 4px;text-align:center;}
  .guidance-head .g-title{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.2em;color:var(--ink);}
  .guidance-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 0 8px;}
  .g-tile{
    border:1px solid var(--hairline);border-radius:10px;
    background:rgba(203,160,90,0.05);
    padding:16px 8px;text-align:center;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    transition:border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
    font-family:'Noto Sans TC',sans-serif;
  }
  .g-tile:active{transform:scale(0.97);}
  /* 單色線條圖示，維持神祕學質感 */
  .g-tile .g-icon{width:26px;height:26px;color:var(--gold);display:flex;align-items:center;justify-content:center;transition:color 0.2s ease;}
  .g-tile .g-icon svg{width:100%;height:100%;display:block;}
  .g-tile .g-label{font-size:0.78rem;font-weight:500;color:var(--ink);letter-spacing:0.02em;}
  .g-tile.active{border-color:var(--gold);background:rgba(203,160,90,0.14);box-shadow:0 0 0 1px rgba(203,160,90,0.35);}
  .g-tile.active .g-icon{color:var(--ink);}

  /* 手風琴展開區：收合時 max-height:0，展開時滑順長高 */
  .guidance-answer{
    max-height:0;overflow:hidden;opacity:0;
    transition:max-height 0.45s ease, opacity 0.35s ease, padding 0.45s ease;
    padding:0;
  }
  .guidance-answer.open{max-height:260px;opacity:1;padding:4px 0 4px;}
  .guidance-answer-inner{
    border:1px solid rgba(203,160,90,0.4);border-radius:6px;
    background:rgba(203,160,90,0.06);
    padding:16px 16px;
  }
  .guidance-answer-tag{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.14em;color:var(--gold);margin-bottom:8px;}
  .guidance-answer-text{
    font-family:"標楷體","DFKai-SB","BiauKai","STKaiti","KaiTi",serif;
    font-size:1.02rem;line-height:1.7;color:var(--ink);
  }

  /* 儀表板 */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  .stat-card{border:1px solid var(--hairline);border-radius:6px;padding:14px 12px;}
  .stat-card .stat-label{font-size:0.62rem;letter-spacing:0.1em;color:var(--mist);margin-bottom:6px;}
  .stat-card .stat-value{font-size:1.3rem;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:6px;}
  .stat-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}

  .trend-label{font-size:0.62rem;letter-spacing:0.1em;color:var(--mist);margin-bottom:8px;}
  .trend-row{display:flex;align-items:flex-end;gap:6px;height:90px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px;}
  .trend-bar{flex-shrink:0;width:18px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .trend-bar .bar{width:100%;background:var(--slate);border-radius:2px 2px 0 0;}
  .trend-bar .bar.ssr{background:var(--ssr);}
  .trend-bar .num{font-size:0.58rem;color:var(--mist);margin-top:3px;}

  .reset-link{font-size:0.68rem;color:#B7554A;text-decoration:underline;cursor:pointer;background:none;border:none;padding:0;font-family:'Noto Sans TC',sans-serif;margin-top:14px;display:block;}

  /* 分享用離畫面卡片(9:16) */
  #share-template{position:fixed;left:-9999px;top:0;width:540px;height:960px;background:radial-gradient(ellipse at 50% 0%, #2A1E4A 0%, #1B1233 45%, #0E0A1C 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 44px;font-family:'Noto Sans TC',sans-serif;}
  #share-template .st-badge{width:74px;height:74px;border-radius:50%;background:#1B1233;border:1px solid rgba(203,160,90,0.5);display:flex;align-items:center;justify-content:center;margin-bottom:26px;}
  #share-template .st-badge svg{width:40px;height:40px;}
  #share-template .st-brand{font-family:'Cinzel',serif;font-size:14px;letter-spacing:6px;color:#E7D9C2;margin-bottom:44px;}
  #share-template .st-panel{background:#F2E8D3;border:1px solid rgba(203,160,90,0.5);border-radius:10px;padding:46px 36px;width:100%;text-align:center;}
  #share-template .st-legend{display:flex;align-items:center;justify-content:center;gap:10px;font-size:20px;font-weight:500;color:#2B2140;margin-bottom:30px;}
  #share-template .st-dot{width:26px;height:26px;border-radius:50%;border:1px solid rgba(43,33,64,0.3);}
  #share-template .st-num-label{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;color:#9483A8;margin-bottom:8px;}
  #share-template .st-num{font-family:'Cinzel',serif;font-size:52px;font-weight:600;color:#2B2140;margin-bottom:30px;}
  #share-template .st-wish{font-family:"標楷體","DFKai-SB","BiauKai","STKaiti","KaiTi",serif;font-size:26px;line-height:1.8;color:#2B2140;padding:0 6px;}
  #share-template .st-footer{margin-top:46px;font-size:13px;letter-spacing:2px;color:#B9A8C9;}
</style>
</head>
<body>

<div class="gold-line"></div>
<div id="starfield"></div>
<div id="meteor-field"></div>
<div id="star-burst" class="star-burst"></div>

<div id="dashboard-btn" class="icon-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="#CBA05A" stroke-width="1.6"><path d="M4 19V10M11 19V5M18 19V13"/></svg>
</div>

<div class="stage">
  <div class="brandbar">
    <div class="rule-row">
      <div class="rule"></div>
      <span class="brand-name">ZHAN FROG &amp; MI FROG</span>
      <div class="rule"></div>
    </div>

<script>
(function(){
  // ---------- 基本日期 ----------
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const date = now.getDate();
  const days = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
  const todayStr = `${month}月${date}日 ${days[now.getDay()]}`;
  const dateKey = `${year}-${String(month).padStart(2,'0')}-${String(date).padStart(2,'0')}`;
  document.getElementById('date-display').innerText = todayStr;

  // ---------- localStorage 工具 ----------
  function loadJSON(key, fallback){
    try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch(e){ return fallback; }
  }
  function saveJSON(key, val){
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
  }

  let history = loadJSON('lb_history', []);
  let guidanceToday = loadJSON('lb_guidance', null);

  // ---------- DOM ----------
  const btn = document.getElementById('draw-btn');
  const ritualStage = document.getElementById('ritual-stage');
  const resultContainer = document.getElementById('result-container');
  const redrawNote = document.getElementById('redraw-note');
  const specTag = document.getElementById('spec-tag');
  const mainPanel = document.getElementById('main-panel');
  const ssrBanner = document.getElementById('ssr-banner');
  const meteorField = document.getElementById('meteor-field');
  const dashboardOverlay = document.getElementById('dashboard-overlay');
  const weaveLabelEl = document.getElementById('weave-label');
  const stageGatherEl = document.getElementById('stage-gather');
  const starBurstEl = document.getElementById('star-burst');
  const progressFillEl = document.getElementById('progress-fill');
  const progressNumEl = document.getElementById('progress-num');

  // 讀取動畫總時長，需與 CSS 的 star-converge / core-grow / glow 動畫時序保持一致
  const LOAD_TOTAL_MS = 3300;

  // ---------- 已抽過今日判斷 ----------
  let todayData = loadJSON('lb_today', null);
  let alreadyDrawnToday = !!(todayData && todayData.savedDate === dateKey);
  if(alreadyDrawnToday) btn.innerText = '輕觸蛙蛙，回顧今日運勢';

  // ---------- 四方指引 ----------
  const guidanceLabels = { study:'學業指引', work:'工作指引', love:'愛情指引', wealth:'財富指引' };
  // 每個分類各自的 json 檔案（格式：[{ "category":"study", "text":"..." }, ...]）
  // 檔案需與 index.html 放在同一個資料夾：study.json / work.json / love.json / wealth.json
  const guidanceFallback = {
    study: ["星象顯示，你的專注力正在回升，這幾天適合重新排定讀書計畫", "困住你的不是題目本身，而是還沒找到適合自己的節奏，慢慢調整就好"],
    work: ["你準備的比自己以為的還要充分，面試或簡報時放膽展現真實的自己", "近期適合主動出擊，被動等待反而會錯過機會"],
    love: ["感情裡的沉默不代表結束，找個時間好好把話說開吧", "先把自己照顧好，對的人自然會被你的狀態吸引"],
    wealth: ["這陣子不適合衝動消費，但小額投資自己（課程、書籍）會有回報", "意外之財有機會出現，但記得留一部分給未來的自己"]
  };
  const guidancePoolCache = {};

  async function fetchGuidanceCategory(cat){
    if(guidancePoolCache[cat]) return guidancePoolCache[cat];
    try{
      const data = await fetch(`${cat}.json`).then(r=>r.json());
      const arr = Array.isArray(data)
        ? data.map(item => (typeof item === 'string' ? item : item.text)).filter(Boolean)
        : [];
      guidancePoolCache[cat] = arr.length ? arr : guidanceFallback[cat];
    }catch(e){
      guidancePoolCache[cat] = guidanceFallback[cat];
    }
    return guidancePoolCache[cat];
  }

  const guidanceAnswer = document.getElementById('guidance-answer');
  const guidanceAnswerTag = document.getElementById('guidance-answer-tag');
  const guidanceAnswerText = document.getElementById('guidance-answer-text');
  let activeGuidanceCat = null;

  function closeGuidance(){
    guidanceAnswer.classList.remove('open');
    document.querySelectorAll('.g-tile').forEach(t=>t.classList.remove('active'));
    activeGuidanceCat = null;
  }

  document.querySelectorAll('.g-tile').forEach(tile=>{
    tile.addEventListener('click', async ()=>{
      const cat = tile.dataset.cat;
      if(navigator.vibrate) navigator.vibrate(30);

      if(activeGuidanceCat === cat){
        closeGuidance();
        return;
      }

      if(!guidanceToday || guidanceToday.date !== dateKey) guidanceToday = { date: dateKey };

      if(!guidanceToday[cat]){
        const arr = await fetchGuidanceCategory(cat);
        guidanceToday[cat] = arr[Math.floor(Math.random()*arr.length)];
        saveJSON('lb_guidance', guidanceToday);
      }

      document.querySelectorAll('.g-tile').forEach(t=>t.classList.remove('active'));
      tile.classList.add('active');
      guidanceAnswerTag.innerText = guidanceLabels[cat];
      guidanceAnswerText.innerText = "「" + guidanceToday[cat] + "」";
      guidanceAnswer.classList.add('open');
      activeGuidanceCat = cat;
    });
  });

  // ============================================================
  // 底部彈出視窗 (Bottom Sheet) 開關控制
  // ============================================================
  const sheetTriggerBtn = document.getElementById('sheet-trigger-btn');
  const sheetOverlay = document.getElementById('sheet-overlay');
  const bottomSheet = document.getElementById('bottom-sheet');

  function openBottomSheet(){
    sheetOverlay.classList.add('show');
    bottomSheet.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeBottomSheet(){
    sheetOverlay.classList.remove('show');
    bottomSheet.classList.remove('open');
    document.body.style.overflow = '';
    closeGuidance();
  }

  sheetTriggerBtn.addEventListener('click', openBottomSheet);
  document.getElementById('sheet-close').addEventListener('click', closeBottomSheet);
  sheetOverlay.addEventListener('click', closeBottomSheet);

  // ---------- 按鈕漣漪 ----------
  function spawnRipple(e){
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.width = r.style.height = size + 'px';
    r.style.left = (e.clientX - rect.left - size/2) + 'px';
    r.style.top = (e.clientY - rect.top - size/2) + 'px';
    btn.appendChild(r);
    setTimeout(()=>r.remove(), 650);
  }

  // ---------- 常駐星空 ----------
  (function generateStarfield(){
    const field = document.getElementById('starfield');
    for(let i=0;i<44;i++){
      const s = document.createElement('div');
      s.className = 'star';
      const size = 1 + Math.random()*2;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.left = (Math.random()*100) + '%';
      s.style.top = (Math.random()*100) + '%';
      s.style.animationDuration = (2 + Math.random()*3) + 's';
      s.style.animationDelay = (Math.random()*3) + 's';
      field.appendChild(s);
    }
  })();

  // ---------- 流星雨(SSR) ----------
  function startMeteorShower(){
    meteorField.innerHTML = '';
    meteorField.classList.add('active');
    document.body.classList.add('ssr-mode');
    for(let i=0;i<18;i++){
      const m = document.createElement('div');
      m.className = 'meteor';
      m.style.left = (Math.random()*100) + '%';
      m.style.animationDuration = (1.2 + Math.random()*1.4) + 's';
      m.style.animationDelay = (Math.random()*2.5) + 's';
      meteorField.appendChild(m);
    }
  }

  // ---------- 讀取動畫：進度條 0~100 控制器 ----------
  // 進度會先以 LOAD_TOTAL_MS 的節奏平滑跑到 92%（與蛙蛙走路/舉燈/發光動畫同步）
  // 實際資料就緒後，呼叫 finish() 讓進度快速補到 100% 再繼續揭曉結果
  function startProgress(){
    progressFillEl.style.width = '0%';
    progressNumEl.innerText = '0';
    const cap = 92;
    const start = performance.now();
    let rafId;
    function tick(now){
      const elapsed = now - start;
      const pct = Math.min(cap, (elapsed / LOAD_TOTAL_MS) * cap);
      progressFillEl.style.width = pct.toFixed(0) + '%';
      progressNumEl.innerText = Math.round(pct);
      if(pct < cap){ rafId = requestAnimationFrame(tick); }
    }
    rafId = requestAnimationFrame(tick);

    return {
      finish(){
        cancelAnimationFrame(rafId);
        return new Promise(resolve=>{
          const startPct = parseFloat(progressFillEl.style.width) || cap;
          const s2 = performance.now();
          const dur = 350;
          function tick2(now){
            const el = now - s2;
            const t = Math.min(1, el / dur);
            const pct = startPct + (100 - startPct) * t;
            progressFillEl.style.width = pct.toFixed(0) + '%';
            progressNumEl.innerText = Math.round(pct);
            if(t < 1){ requestAnimationFrame(tick2); } else { resolve(); }
          }
          requestAnimationFrame(tick2);
        });
      }
    };
  }

  function resetLoadingVisuals(){
    ritualStage.classList.remove('active');
    progressFillEl.style.width = '0%';
    progressNumEl.innerText = '0';
    weaveLabelEl.innerText = '凝聚星辰之力…';
    starBurstEl.classList.remove('expand','fade-out');
    starBurstEl.style.opacity = '0';
    // 強制重排，確保下一次加上 .active 時 CSS 動畫會重新從頭播放
    void stageGatherEl.offsetWidth;
  }

  // 觸發全螢幕星力擴散轉場：先向外擴散覆蓋畫面，趁畫面被覆蓋時換上抽籤結果，
  // 再讓光芒淡出，形成「凝聚 -> 爆發 -> 轉入結果」的視覺轉場
  function triggerStarBurst(revealCallback){
    return new Promise(resolve=>{
      starBurstEl.style.opacity = '';
      starBurstEl.classList.add('expand');
      setTimeout(()=>{
        revealCallback();
        starBurstEl.classList.remove('expand');
        starBurstEl.classList.add('fade-out');
        setTimeout(()=>{
          starBurstEl.classList.remove('fade-out');
          starBurstEl.style.opacity = '0';
          resolve();
        }, 560);
      }, 560);
    });
  }

  // ---------- 資料抓取（金句 + 特殊庫） ----------
  async function fetchPool(){
    const colors = await fetch('color.json').then(r=>r.json());
    let sentenceData;
    try{ sentenceData = await fetch('sentence.json').then(r=>r.json()); }
    catch(e){ sentenceData = []; }

    let pool;
    if(Array.isArray(sentenceData)){
      pool = sentenceData; // 單一陣列格式
    } else {
      pool = sentenceData.all || Object.values(sentenceData).flat();
    }
    return { colors, pool };
  }

  async function fetchSSRPool(){
    try{
      const data = await fetch('ssr.json').then(r=>r.json());
      return Array.isArray(data) ? data : (data.ssr || []);
    }catch(e){
      return [
        { text: "SSR 級超幸運：今天宜買樂透，宜大膽告白，宜做任何你猶豫已久的事" },
        { text: "流星劃過的瞬間，好運已經悄悄落在你的手串上了" },
        { text: "百分之一的機率被你抽中，代表今天注定不平凡" }
      ];
    }
  }

  // ---------- 抽籤主邏輯 ----------
  btn.addEventListener('click', async function(e){
    if(navigator.vibrate) navigator.vibrate(200);
    spawnRipple(e);
    btn.style.display = 'none';

    const skipHop = alreadyDrawnToday;
    let progressCtrl = null;
    const labelTimers = [];

    if(!skipHop){
      resetLoadingVisuals();
      ritualStage.classList.add('active');
      progressCtrl = startProgress();
      labelTimers.push(setTimeout(()=>{ weaveLabelEl.innerText = '星芒已然成形…'; }, 1750));
      labelTimers.push(setTimeout(()=>{ weaveLabelEl.innerText = '能量即將降臨…'; }, 2600));
    }

    try{
      let luckyData = null;
      if(alreadyDrawnToday && todayData){
        luckyData = todayData;
      }

      const workPromise = (async ()=>{
        if(luckyData) return luckyData;

        const isSSR = Math.random() < 0.01;
        const { colors, pool } = await fetchPool();

        const newColor = colors[Math.floor(Math.random()*colors.length)];
        const newNum = Math.floor(Math.random()*99) + 1;

        let newSentence;
        if(isSSR){
          const ssrPool = await fetchSSRPool();
          newSentence = ssrPool[Math.floor(Math.random()*ssrPool.length)];
        } else {
          newSentence = pool[Math.floor(Math.random()*pool.length)];
        }

        const data = { savedDate: dateKey, color: newColor, sentence: newSentence, num: newNum, isSSR };
        saveJSON('lb_today', data);

        history.push({ date: dateKey, colorName: newColor.name, colorHex: newColor.hex, num: newNum, isSSR });
        if(history.length > 120) history = history.slice(-120);
        saveJSON('lb_history', history);

        return data;
      })();

      const minWait = skipHop ? 200 : LOAD_TOTAL_MS;

      // 用 settle 包一層，確保「至少等滿 minWait」這件事不會被 fetch 提早失敗打斷，
      // 讀取動畫（凝聚星辰）才能穩定播滿 3~3.5 秒，不會因為資料很快回來或很快出錯而被跳過
      const settled = await Promise.all([
        workPromise.then(v => ({ ok:true, value:v })).catch(e => ({ ok:false, error:e })),
        new Promise(res => setTimeout(res, minWait))
      ]).then(([r]) => r);

      if(!settled.ok){ throw settled.error; }
      const finalData = settled.value;

      if(progressCtrl){ await progressCtrl.finish(); }
      labelTimers.forEach(t=>clearTimeout(t));

      if(skipHop){
        ritualStage.classList.remove('active');
        todayData = finalData;
        playReveal(finalData);
      } else {
        await triggerStarBurst(()=>{
          ritualStage.classList.remove('active');
          todayData = finalData;
          playReveal(finalData);
        });
      }

    }catch(err){
      console.error('讀取失敗:', err);
      labelTimers.forEach(t=>clearTimeout(t));
      ritualStage.classList.remove('active');
      resultContainer.classList.add('show');
      document.getElementById('wish').innerText = '讀取資料時發生錯誤，請檢查檔案路徑。';
      document.getElementById('wish').classList.add('play');
    }
  });

  function playReveal(luckyData){
    document.getElementById('color-box').style.backgroundColor = luckyData.color.hex;
    document.getElementById('color-name').innerHTML = `幸運色：<span class="highlight-color">${luckyData.color.name}</span>`;
    document.getElementById('number-val').innerText = luckyData.num;
    document.getElementById('wish').innerText = "「" + luckyData.sentence.text + "」";

    resultContainer.classList.add('show');
    if(alreadyDrawnToday) redrawNote.style.display = 'block';

    if(luckyData.isSSR){
      specTag.innerText = '天選';
      specTag.classList.add('ssr');
      mainPanel.classList.add('ssr-glow');
      ssrBanner.classList.add('show');
      startMeteorShower();
    }

    const colorRow = document.getElementById('color-name-row');
    const colorBox = document.getElementById('color-box');
    const seal = document.getElementById('number-seal');
    const wish = document.getElementById('wish');
    const actionRow = document.getElementById('action-row');
    const sheetTriggerBtn = document.getElementById('sheet-trigger-btn');

    colorRow.classList.add('play');
    colorBox.classList.add('pop');
    setTimeout(()=>{ seal.classList.add('play','stamp'); if(navigator.vibrate) navigator.vibrate(60); }, 260);
    setTimeout(()=>{ wish.classList.add('play'); }, 520);
    setTimeout(()=>{ actionRow.classList.add('play'); }, 760);
    setTimeout(()=>{ sheetTriggerBtn.classList.add('play'); }, 900);
  }

  // ---------- IG 限動分享 ----------
  document.getElementById('share-btn').addEventListener('click', async ()=>{
    const statusEl = document.getElementById('share-status');
    statusEl.innerText = '圖片生成中…';

    const d = todayData;
    if(!d){ statusEl.innerText = '尚無資料可以分享'; return; }

    document.getElementById('st-dot').style.backgroundColor = d.color.hex;
    document.getElementById('st-color-name').innerText = `幸運色：${d.color.name}`;
    document.getElementById('st-num').innerText = d.num;
    document.getElementById('st-wish').innerText = "「" + d.sentence.text + "」";
    document.getElementById('st-date').innerText = todayStr + '　每日能量小站';

    try{
      const target = document.getElementById('share-template');
      const canvas = await html2canvas(target, { scale: 2, backgroundColor: null });
      canvas.toBlob(async (blob)=>{
        if(!blob){ statusEl.innerText = '圖片生成失敗'; return; }
        const file = new File([blob], 'lucky-energy.png', { type: 'image/png' });

        if(navigator.canShare && navigator.canShare({ files:[file] })){
          try{
            await navigator.share({ files:[file], title:'今日能量', text:'我的幸運手串今日能量 ✦' });
            statusEl.innerText = '已開啟分享選單，選擇「限時動態」即可';
          }catch(err){
            statusEl.innerText = '已取消分享';
          }
        } else {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = 'lucky-energy.png';
          document.body.appendChild(a); a.click(); a.remove();
          URL.revokeObjectURL(url);
          statusEl.innerText = '圖片已下載，開啟 IG 上傳到限時動態吧';
        }
      }, 'image/png');
    }catch(err){
      console.error(err);
      statusEl.innerText = '圖片生成失敗，請稍後再試';
    }
  });

  // ---------- 數據儀表板 ----------
  document.getElementById('dashboard-btn').addEventListener('click', ()=>{
    renderDashboard();
    dashboardOverlay.classList.add('show');
  });
  document.getElementById('dashboard-close').addEventListener('click', ()=>{
    dashboardOverlay.classList.remove('show');
  });
  document.getElementById('reset-history-btn').addEventListener('click', ()=>{
    if(confirm('確定要清除本機累積的抽籤紀錄嗎？此動作無法復原。')){
      history = [];
      saveJSON('lb_history', history);
      renderDashboard();
    }
  });

  function renderDashboard(){
    const monthPrefix = `${year}-${String(month).padStart(2,'0')}`;
    const monthCount = history.filter(h => h.date.startsWith(monthPrefix)).length;
    document.getElementById('stat-month-count').innerText = monthCount + ' 天';
    document.getElementById('stat-total-count').innerText = history.length + ' 天';

    const ssrCount = history.filter(h => h.isSSR).length;
    document.getElementById('stat-ssr-count').innerText = ssrCount + ' 次';

    const freq = {};
    history.forEach(h=>{
      if(!freq[h.colorName]) freq[h.colorName] = { count:0, hex:h.colorHex };
      freq[h.colorName].count++;
    });
    let topColor = null, topCount = 0;
    Object.keys(freq).forEach(name=>{
      if(freq[name].count > topCount){ topCount = freq[name].count; topColor = name; }
    });
    const topColorEl = document.getElementById('stat-top-color');
    if(topColor){
      topColorEl.innerHTML = `<span class="stat-dot" style="background:${freq[topColor].hex}"></span>${topColor}`;
    } else {
      topColorEl.innerHTML = `<span class="stat-dot" style="background:#ccc;"></span>尚無紀錄`;
    }

    const trendRow = document.getElementById('trend-row');
    trendRow.innerHTML = '';
    const recent = history.slice(-14);
    if(recent.length === 0){
      trendRow.innerHTML = '<div style="font-size:0.72rem;color:var(--mist);">還沒有抽籤紀錄，抽完今日能量後回來看看吧</div>';
    } else {
      recent.forEach(h=>{
        const wrap = document.createElement('div');
        wrap.className = 'trend-bar';
        const bar = document.createElement('div');
        bar.className = 'bar' + (h.isSSR ? ' ssr' : '');
        const pct = Math.max(6, Math.round((h.num/99)*100));
        bar.style.height = pct + '%';
        const numLabel = document.createElement('div');
        numLabel.className = 'num';
        numLabel.innerText = h.num;
        wrap.appendChild(bar);
        wrap.appendChild(numLabel);
        trendRow.appendChild(wrap);
      });
    }
  }
})();
</script>
